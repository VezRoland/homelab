services:
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "853:853/tcp"
    volumes:
      - ./data/work:/opt/adguardhome/work
      - ./data/conf:/opt/adguardhome/conf
    networks:
      adguard_net:
        ipv4_address: ${ADGUARDHOME_IPV4_ADDRESS}
      traefik:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.adguardhome.rule=Host(`${ADGUARDHOME_HOSTNAME}`)
      - traefik.http.routers.adguardhome.middlewares=adguard-redirect
      - traefik.http.middlewares.adguard-redirect.redirectscheme.scheme=https

      - traefik.http.routers.adguardhome-secure.entrypoints=websecure
      - traefik.http.routers.adguardhome-secure.rule=Host(`${ADGUARDHOME_HOSTNAME}`)
      - traefik.http.routers.adguardhome-secure.service=adguardhome
      - traefik.http.routers.adguardhome-secure.tls=true
      - traefik.http.routers.adguardhome-secure.tls.certresolver=cloudflare
      - traefik.http.services.adguardhome.loadbalancer.server.port=80

networks:
  adguard_net:
    driver: macvlan
    driver_opts:
      parent: ${ADGUARDHOME_MACVLAN_NETWORK_CARD}
    ipam:
      config:
        - subnet: ${ADGUARDHOME_MACVLAN_SUBNET}
          gateway: ${ADGUARDHOME_MACVLAN_GATEWAY}
          ip_range: ${ADGUARDHOME_IPV4_ADDRESS}/32
  traefik:
    external: true
