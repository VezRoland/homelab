services:
  radicale:
    container_name: radicale
    image: tomsquest/docker-radicale
    restart: unless-stopped
    volumes:
      - ./data/radicale/data:/data
      - ./data/radicale/config:/config:ro
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.radicale.rule=Host(`${RADICALE_HOSTNAME}`)
      - traefik.http.routers.radicale.entrypoints=websecure
      - traefik.http.routers.radicale.tls=true
      - traefik.http.routers.radicale.tls.certResolver=cloudflare
      - traefik.http.services.radicale.loadbalancer.server.port=5232
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true

  vdirsyncer:
    container_name: vdirsyncer
    image: bleala/vdirsyncer:latest
    restart: unless-stopped
    depends_on:
      - radicale
    volumes:
      - vdirsyncer:/vdirsyncer
      - ./data/vdirsyncer/config.ini:/vdirsyncer/config
    env_file:
      - .env
    networks:
      - traefik

volumes:
  vdirsyncer:
    name: vdirsyncer
    driver: local

networks:
  traefik:
    external: true
